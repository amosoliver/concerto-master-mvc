pt-BR:
  date:
    formats:
      default: "%d/%m/%Y"
  time:
    formats:
      default: "%d/%m/%Y %H:%M"

  helpers:
    submit:
      create: "Criar %{model}"
      update: "Atualizar %{model}"
      submit: "Salvar %{model}"

  # O app roda só em pt-BR (config.i18n.default_locale) sem fallback para o
  # en.yml interno do Rails, então as mensagens padrão de erro precisam ser
  # definidas aqui (não vêm "de graça" da gem rails-i18n, que não está incluída).
  errors:
    format: "%{attribute} %{message}"
    messages:
      accepted: "deve ser aceito"
      blank: "não pode ficar em branco"
      confirmation: "não está igual a %{attribute}"
      empty: "não pode ficar vazio"
      equal_to: "deve ser igual a %{count}"
      even: "deve ser par"
      exclusion: "não está incluído na lista"
      greater_than: "deve ser maior que %{count}"
      greater_than_or_equal_to: "deve ser maior ou igual a %{count}"
      inclusion: "não está incluído na lista"
      invalid: "não é válido"
      less_than: "deve ser menor que %{count}"
      less_than_or_equal_to: "deve ser menor ou igual a %{count}"
      model_invalid: "A validação falhou: %{errors}"
      not_a_number: "não é um número"
      not_an_integer: "não é um número inteiro"
      odd: "deve ser ímpar"
      other_than: "deve ser diferente de %{count}"
      present: "deve ficar em branco"
      required: "não pode ficar em branco"
      taken: "já está em uso"
      too_long:
        one: "é muito longo (máximo: 1 caractere)"
        other: "é muito longo (máximo: %{count} caracteres)"
      too_short:
        one: "é muito curto (mínimo: 1 caractere)"
        other: "é muito curto (mínimo: %{count} caracteres)"
      wrong_length:
        one: "não possui o tamanho correto (1 caractere)"
        other: "não possui o tamanho correto (%{count} caracteres)"

